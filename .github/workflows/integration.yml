name: integration

# E2E integration suite — boots the full stack (azzurra-testnet + grappa
# + nginx + cicchetto SPA build + Playwright runner) via
# `scripts/integration.sh` and runs the M1-M12 + BUG7 matrix on chromium
# and webkit-iphone-15 projects.
#
# Path-filtered: only runs on changes that could break end-to-end
# behavior. Doc-only / CI-only changes don't trigger this (the
# Elixir-only ci.yml workflow handles unit-level gates on every push).
# The three orchestration scripts (integration.sh, testnet.sh, _lib.sh)
# ARE in scope — they boot the stack, set CONTAINER_UID, and wire the
# compose project together; a regression in them breaks CI but not
# local mac dev (different bind-mount semantics). Operator scripts
# (deploy.sh, observer.sh, etc.) stay out of scope deliberately.
#
# Stack timing: cold ~6-8 min for the testnet+grappa+nginx images +
# Playwright base pull; warm with cache it's faster but we don't cache
# docker layers cross-runs (would need a registry push). Suite itself
# runs in ~16s once everything is up.
#
# Failure artifacts: Playwright writes traces (zip), screenshots, and
# videos to cicchetto/e2e/test-results/ on test failure (configured in
# playwright.config.ts: trace=retain-on-failure, screenshot=only-on-failure,
# video=retain-on-failure, retries=0 — pass-or-fail, no flake masking). The HTML report lands in
# cicchetto/e2e/playwright-report/. Both are uploaded as artifacts when
# the job fails — the trace zip is the primary debug surface, opens in
# `npx playwright show-trace <zip>`.

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "cicchetto/src/**"
      - "cicchetto/e2e/**"
      - "config/**"
      - "priv/**"
      - "scripts/integration.sh"
      - "scripts/testnet.sh"
      - "scripts/_lib.sh"
      - "mix.exs"
      - "mix.lock"
      - ".github/workflows/integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "cicchetto/src/**"
      - "cicchetto/e2e/**"
      - "config/**"
      - "priv/**"
      - "scripts/integration.sh"
      - "scripts/testnet.sh"
      - "scripts/_lib.sh"
      - "mix.exs"
      - "mix.lock"
      - ".github/workflows/integration.yml"

# Avoid duplicate runs on PRs from same-repo branches; cancel an
# in-flight run if a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: cicchetto + grappa + azzurra-testnet
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # `packages: read` so `docker login ghcr.io` can pull the
    # prebuilt bahamut + services images from `ghcr.io/vjt/*` (see
    # cicchetto/e2e/compose.ghcr-vjt.yaml). Default GITHUB_TOKEN has
    # this scope on the same-owner package, but only when permissions
    # are declared at the job level.
    #
    # `actions: write` so `docker/build-push-action`'s `type=gha`
    # cache exporter can write to GitHub's per-repo action cache.
    # Reads are implicit on `actions: read` (the default); writes
    # require explicit grant.
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # azzurra-testnet (cicchetto/e2e/infra) is a public submodule —
          # `recursive` initializes it via the default GITHUB_TOKEN
          # (public-repo HTTPS, no deploy key needed). Without this the
          # script bails at the submodule-empty check.
          submodules: recursive

      - name: Verify submodule populated
        run: |
          test -d cicchetto/e2e/infra/bahamut || {
            echo "azzurra-testnet submodule looks empty";
            exit 1;
          }

      - name: Upgrade docker compose plugin
        # Runner-shipped docker compose is too old to grok the
        # cicchetto/e2e/compose.yaml `include:` + per-service override
        # pattern (`services.leaf-v6 conflicts with imported resource`).
        # Newer compose merges per-service overrides into the included
        # file's service definition; older compose treats them as a
        # duplicate-resource error. Pin to v5.0.2 — matches the local
        # dev environment (CI/dev parity) so a workflow that passes
        # locally also passes on the runner.
        run: |
          COMPOSE_VER=v5.0.2
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-x86_64" \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - name: Log in to GHCR
        # The bahamut + services images live at
        # `ghcr.io/vjt/{bahamut,services}` — published by the
        # `images.yml` workflow in the cicchetto/e2e/infra submodule
        # repo (vjt/azzurra-testnet). `secrets.GITHUB_TOKEN` is the
        # ephemeral per-run token; it has `packages: read` scope (see
        # job-level permissions above) and can pull same-owner
        # packages.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # Required for `cache-from / cache-to: type=gha` on
        # `docker/build-push-action`. Configures the local docker
        # daemon with a buildx builder that supports the GHA cache
        # exporter (writes to GitHub's per-repo action cache, scoped
        # per ref + branch). Subsequent `docker compose build` calls
        # also benefit because buildx becomes the default builder
        # once set up.
        uses: docker/setup-buildx-action@v3

      - name: Resolve runner UID/GID
        # `scripts/_lib.sh:e2e_export_uid` exports
        # `CONTAINER_UID=$(id -u)` on Linux for the compose stack so
        # bind-mounted writes land as the host user. Pre-build below
        # MUST pass the SAME values as build-args — BuildKit includes
        # ALL declared build-args in cache keys (even when the
        # Dockerfile doesn't reference them, which is currently the
        # case here), so a build-args mismatch between pre-build and
        # the subsequent compose-driven build would force a full
        # cache miss on every CI run.
        id: ids
        run: |
          {
            echo "uid=$(id -u)"
            echo "gid=$(id -g)"
          } >> "$GITHUB_OUTPUT"

      - name: Build grappa:e2e (cached)
        # Pre-build the Elixir/Phoenix bouncer image with the GHA
        # cache exporter so the heavy `mix deps.compile` layer (~57s
        # on cold) is cached across CI runs. The Dockerfile orders
        # COPY mix.exs/mix.lock → deps.get → deps.compile → COPY
        # config/ → COPY . → compile, so the cache hits as long as
        # mix.lock + config/ are unchanged.
        #
        # `load: true` tags the image in the local docker daemon
        # (`grappa:e2e`) so the subsequent compose-driven builds in
        # scripts/{integration,testnet}.sh find it and rebuild
        # instantly off the warm buildx cache (compose's `build:` +
        # `--build` still get invoked; what changes is the per-layer
        # cache-hit cost).
        #
        # `cache-from / cache-to type=gha,mode=max` exports ALL
        # intermediate layers (not just the final image), so a
        # subsequent run hitting any layer mid-stage can resume from
        # there. `mode=max` is correct for multi-stage caching;
        # `mode=min` (the default) only exports the final layers.
        #
        # CONTAINER_UID/GID build-args are passed even though the
        # current Dockerfile doesn't reference them — see "Resolve
        # runner UID/GID" rationale above for the cache-key parity
        # constraint.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: grappa:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CONTAINER_UID=${{ steps.ids.outputs.uid }}
            CONTAINER_GID=${{ steps.ids.outputs.gid }}

      - name: Run integration suite
        # `bash scripts/integration.sh` boots the stack, runs the
        # Playwright suite, tears the stack down on EXIT trap. Exit
        # code is the runner's exit code (test result), propagated.
        #
        # `COMPOSE_FILE` chains the base compose.yaml with our
        # CI-only override compose.ghcr-vjt.yaml that swaps the
        # bahamut + services `build:` blocks for prebuilt
        # `ghcr.io/vjt/*:main` image pulls. Saves ~37s per run (the
        # full hub + leaves + services compile cycle from source).
        # Paths are RELATIVE to the CWD that scripts/{integration,
        # testnet}.sh cd into (cicchetto/e2e/), which is where both
        # compose files live.
        env:
          COMPOSE_FILE: compose.yaml:compose.ghcr-vjt.yaml
        run: bash scripts/integration.sh

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: cicchetto/e2e/test-results/
          # 14d is enough to triage; default 90d wastes storage on
          # a noisy suite during the early CI shakedown phase.
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: cicchetto/e2e/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
