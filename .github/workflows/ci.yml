name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid duplicate runs on PRs from same-repo branches
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.5"

jobs:
  test:
    name: test + lint + audit
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Sobelow (fail on Medium+)
        run: mix sobelow --config --exit Medium

      - name: Hex audit (CVE check)
        # Advisory-only (non-blocking): cowlib has two UNFIXABLE cow_cookie
        # advisories (CVE-2026-43969 LOW + CVE-2026-43966 MED, fixed=None,
        # no patched release) that are N/A to grappa (we only consume Cookie
        # headers via Plug, never compose request cookies via cow_cookie).
        # hex.audit has no per-advisory ignore, so it can't express that.
        # `mix deps.audit` below remains the HARD, blocking CVE gate.
        # Restore this to blocking when cowlib ships a patch — see #149.
        continue-on-error: true
        run: mix hex.audit

      - name: Mix audit (CVE check)
        run: mix deps.audit

      - name: Doctor (doc + @spec coverage)
        run: mix doctor

      - name: Install media tools (MetadataStrip shells out to them)
        # `Grappa.Uploads.MetadataStrip` (#39) is fail-CLOSED: tests
        # exercise real exiftool/ffmpeg invocations on committed
        # GPS-tagged fixtures. The Docker image gets these via
        # `apk add`; this job runs on the bare runner via setup-beam,
        # so install them here or every strip test fails with
        # "exiftool not found on PATH" (red main 2026-06-10).
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends libimage-exiftool-perl ffmpeg

      - name: Tests with coverage
        run: mix coveralls.json --warnings-as-errors

      - name: Bats (bin/grappa dispatcher)
        run: vendor/bats-core/bin/bats test/bin/

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: ./cover/excoveralls.json
          fail_ci_if_error: false

  dialyzer:
    name: dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + build + PLTs
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install deps + compile
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile

      - name: Build PLT (cached)
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format short

      # Docs build lives in this job because ex_doc is `only: [:dev]` in
      # mix.exs (we don't want it pulled into the test runner). The
      # dialyzer job already runs in MIX_ENV=dev with deps+_build cached,
      # so adding a docs step here costs nothing extra.
      - name: Build docs (no warnings)
        run: mix docs
