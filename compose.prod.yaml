# grappa — prod compose (standalone, NOT an override of compose.yaml)
#
# Build + run:  scripts/deploy.sh
# Tail logs:    docker compose -f compose.prod.yaml logs -f
#
# Architecture: nginx is the only LAN-facing service. It owns vlan53
# 192.168.53.11 (where DNS grappa.bad.ass resolves) and reverse-proxies
# the bouncer + serves cicchetto's static SPA dist. grappa lives on a
# Docker-managed bridge (grappa_internal) and is reachable ONLY through
# nginx — operator + iPhone PWA both come in via grappa.bad.ass:80.
#
# Differences vs dev (compose.yaml):
#   - target: runtime (mix release, no mix tools, no source bind-mount)
#   - SECRET_KEY_BASE required (no dev fallback)
#   - DATABASE_PATH points at /app/runtime/grappa_prod.db
#   - grappa is NOT on vlan53 — it's only reachable through nginx
#   - cicchetto-build (oneshot) populates ./runtime/cicchetto-dist on host
#   - nginx serves dist + proxies /auth /me /networks /healthz /socket

services:
  grappa:
    build:
      context: .
      target: runtime
      args:
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        CONTAINER_GID: ${CONTAINER_GID:-1000}
    image: grappa:prod
    pull_policy: never
    container_name: grappa
    hostname: grappa
    restart: always
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    networks:
      - grappa_internal
    volumes:
      - ./runtime:/app/runtime
    environment:
      MIX_ENV: prod
      DATABASE_PATH: /app/runtime/grappa_prod.db
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?missing SECRET_KEY_BASE — generate with scripts/mix.sh phx.gen.secret}
      PORT: "4000"
      RELEASE_COOKIE: ${RELEASE_COOKIE:?missing RELEASE_COOKIE — random hex string for distributed Erlang}
      GRAPPA_ENCRYPTION_KEY: ${GRAPPA_ENCRYPTION_KEY:?missing GRAPPA_ENCRYPTION_KEY — generate with scripts/mix.sh grappa.gen_encryption_key}
      PHX_HOST: ${PHX_HOST:-grappa.bad.ass}
      # BEAM resource caps (see rel/env.sh.eex). Bump GRAPPA_MAX_USERS
      # if a deploy needs more concurrent users than the default fits.
      # GRAPPA_DIRTY_SCHEDULERS unset → defaults to $(nproc) at boot.
      GRAPPA_MAX_USERS: ${GRAPPA_MAX_USERS:-100}
      GRAPPA_DIRTY_SCHEDULERS: ${GRAPPA_DIRTY_SCHEDULERS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Oneshot service — builds cicchetto's static SPA into
  # ./runtime/cicchetto-dist on the host. scripts/deploy.sh runs this
  # explicitly via `compose run --rm` before bringing up nginx, so dist/
  # is always fresh on every deploy. The depends_on below is the safety
  # net for a manual `compose up` (compose will run the dep to completion
  # before starting nginx).
  #
  # Why a host bind-mount instead of a named volume: a fresh Docker named
  # volume is root:root, but the container drops to UID 1000 (so node_modules
  # + bun.lock writes to the bind-mounted ./cicchetto/ don't land as root
  # on the host filesystem). Container-as-1000 + named-volume-as-root
  # collides on Vite's prepare-out-dir step (EACCES on copyfile to
  # /app/dist/). Host bind-mount with deploy.sh's `mkdir -p` (default
  # ownership inherits from the operator's UID, which IS 1000 on the
  # canonical deployment) sidesteps the collision and makes dist/
  # inspectable from the host (`ls runtime/cicchetto-dist/` to confirm
  # the build output without docker exec).
  #
  # Cache layout matches scripts/bun.sh: bun install cache at
  # ./runtime/bun-cache (host bind-mount, shared across worktrees), tmpfs
  # /tmp under the dropped UID. node_modules + bun.lock land in the
  # bind-mounted ./cicchetto on the host — same as dev `scripts/bun.sh`.
  cicchetto-build:
    image: oven/bun:1
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    volumes:
      - ./cicchetto:/app
      - ./runtime/bun-cache:/cache
      - ./runtime/cicchetto-dist:/app/dist
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    environment:
      HOME: /tmp
      BUN_INSTALL_CACHE_DIR: /cache
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run build"]

  nginx:
    image: nginx:alpine
    container_name: grappa-nginx
    hostname: grappa-nginx
    restart: always
    networks:
      vlan53:
        ipv4_address: 192.168.53.11
      grappa_internal:
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./runtime/cicchetto-dist:/usr/share/nginx/html:ro
    depends_on:
      grappa:
        condition: service_started
      cicchetto-build:
        condition: service_completed_successfully
    healthcheck:
      # 127.0.0.1, not localhost: alpine resolves localhost to ::1 first
      # but nginx.conf only declares `listen 80` (IPv4 wildcard), not
      # `listen [::]:80`, so the IPv6 connect refuses → healthcheck fails.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  vlan53:
    external: true
  grappa_internal:
    driver: bridge
