# grappa — integration testing stack (cicchetto/e2e)
#
# A self-contained docker compose that boots:
#   - the azzurra-testnet (hub + leaf-v4 + leaf-v6 + services), via the
#     submodule at infra/compose.yaml — Bahamut + Anope-shape services so
#     CAP/SASL/NickServ behave like real Azzurra.
#   - grappa (dev image, build target — same source as `scripts/test.sh`),
#     pointed at irc://hub:6667 via env override (no host-DNS dependency).
#   - cicchetto-build-test (oneshot) — builds the SPA into a named volume.
#   - nginx-test — same image + nginx.conf as prod; serves the SPA dist
#     and reverse-proxies grappa-test:4000.
#   - playwright-runner — Bun-based, runs the e2e suite against
#     http://nginx-test:80 from inside the docker network.
#
# Run: scripts/integration.sh (from worktree root). NEVER raw docker compose
# from outside that wrapper — it sets up tear-down on exit.
#
# Why all-in-one stack vs reusing dev/prod compose:
#   - port collisions: a dev `docker compose up` already binds :4000
#     (grappa) and :6667 (a test would clash if it also published).
#     Integration stack publishes nothing on the host — services talk
#     intra-network only. The runner reaches nginx-test by docker DNS.
#   - test isolation: separate sqlite db (runtime/grappa_test.db inside
#     the e2e named volume), separate cicchetto dist named volume, no
#     shared state with dev or prod.
#   - reproducibility: a contributor can `docker compose up` the dev
#     stack AND `scripts/integration.sh` simultaneously without
#     conflict.

name: grappa-e2e

include:
  # azzurra-testnet — hub + leaves + services. Pinned via submodule SHA.
  - path: ./infra/compose.yaml

services:
  # Drop the testnet's host port publishes. The runner talks to hub
  # by docker DNS (`bahamut-test:6667`) over the shared bridge — no
  # need to expose 6667/6697 on the host (would clash with anything
  # else listening there, e.g. a real irssi).
  # Hub stays purely an S2S router; clients (the bouncer + the runner
  # peer) ALWAYS go through a leaf. We INTENTIONALLY do NOT add the hub
  # to the `grappa-e2e` bridge here, and we do NOT alias
  # `hub.azzurra.chat` on it — doing so poisons the hub's DNS for its
  # own name across the leaf-net side: docker's embedded DNS, when a
  # container is multi-homed and the same alias is registered on
  # multiple networks, returns the alias's address on the network with
  # the highest internal precedence (empirically the most-recently
  # attached one), so leaf4 querying `hub.azzurra.chat` gets the hub's
  # `grappa-e2e` IP — which leaf4 has no route to — and the autoconnect
  # fails with "No C/N conf lines" hub-side because the inbound source
  # IP doesn't match any C: line. Symptom is split-mode permanently
  # active leaf-side: 0 servers in /STATS, no auto-op on JOIN, MODE
  # rejected with 482. Keep the hub OFF grappa-e2e and only the leaf
  # carries the `bahamut-test` alias for client traffic.
  hub:
    ports: !override []

  # Per vjt: client connections (both grappa-test the bouncer AND the
  # playwright-runner peer) ALWAYS go to a leaf, never the hub. Hubs
  # are S2S routers; user-facing IRC servers are leaves. The
  # `bahamut-test` alias here is the ONE name everything points at.
  leaf-v4:
    ports: !override []
    networks:
      leaf4-net: null
      grappa-e2e:
        aliases: [leaf4.azzurra.chat, bahamut-test]

  leaf-v6:
    ports: !override []

  # One-shot seeder. Boots the schema (ecto.migrate) and writes the
  # baseline (one user `vjt` + one bahamut-test bind w/ autojoin
  # `["#bofh"]`) into the e2e_runtime sqlite DB BEFORE grappa-test
  # starts — so when grappa-test's Bootstrap reads the credentials,
  # the row is already there and the upstream IRC session spawns
  # immediately.
  #
  # Why a sidecar instead of running mix tasks from the runner:
  #   - Boundary: the runner is a pure REST/IRC client, not a
  #     container manager. `docker exec` from inside a container
  #     requires either docker.sock mount (privilege escalation) or
  #     a separate docker daemon (CI complication). The sidecar is
  #     the same image as grappa-test and shares the e2e_runtime
  #     volume — it's a normal mix-task invocation, not a remote
  #     control surface.
  #   - Production fidelity: matches the operator's prod ritual
  #     (mix grappa.create_user / mix grappa.bind_network) verbatim,
  #     so a mix-task regression surfaces here first.
  #
  # Hardcoded creds are TEST-ONLY (the e2e_runtime DB is wiped on
  # every `compose down -v`); see fixtures/seedData.ts for the
  # constants the runner reads back.
  grappa-e2e-seeder:
    build:
      context: ../..
      args:
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        CONTAINER_GID: ${CONTAINER_GID:-1000}
    image: grappa:e2e
    pull_policy: never
    container_name: grappa-e2e-seeder
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    volumes:
      - ../..:/app
      - ../../runtime/e2e/grappa-runtime:/app/runtime
    environment:
      MIX_ENV: dev
      ELIXIR_ERL_OPTIONS: "+fnu"
      GRAPPA_CAPTCHA_PROVIDER: disabled
    command:
      - "sh"
      - "-c"
      - |
        set -e
        # Bind-mount `../..:/app` shadows the image-baked `.mix/`, `.hex/`,
        # `deps/`, `_build/`. CP23 S1 lessons (memories
        # `feedback_named_volume_uid_trap` + `feedback_bind_mount_shadows_image`):
        # named volumes for these dirs init root-owned and trip the dropped UID;
        # bind-mount with explicit `mix local.hex` + `mix deps.get` is the
        # idempotent fix. First run is cold (compile from scratch), subsequent
        # runs reuse the bind-mounted host `_build/`.
        mix local.hex --force
        mix local.rebar --force
        mix deps.get
        mix ecto.create
        mix ecto.migrate
        mix grappa.create_user --name vjt --password test-password-not-secret
        mix grappa.bind_network --user vjt --network bahamut-test \
          --server bahamut-test:6667 --no-tls --nick vjt-grappa \
          --auth none --autojoin '#bofh'
        mix grappa.seed_scrollback --user vjt --network bahamut-test \
          --channel '#bofh' --count 200 --sender seed-bot
        # M-cluster M-7 — second seeded user with is_admin=true so the
        # admin-gate Playwright spec can compare admin vs non-admin
        # vs visitor visibility. No --admin flag on create_user (M-7
        # is cic-only — server-task change is out of scope); promote
        # via Accounts.update_admin_flags/2 from a mix run. The bind
        # is the same network so the admin can log in and have the
        # same surface as vjt.
        mix grappa.create_user --name admin-vjt --password test-password-not-secret
        mix run -e 'user = Grappa.Repo.get_by!(Grappa.Accounts.User, name: "admin-vjt"); {:ok, _} = Grappa.Accounts.update_admin_flags(user, %{is_admin: true})'
        # M-cluster M-9b — third seeded user, bound to bahamut-test so
        # Bootstrap spawns a live Session.Server at boot. The M-9b
        # e2e logs in as admin-vjt and hits POST /admin/sessions/...
        # /disconnect against THIS user's session (vjt's session is
        # reserved for non-admin specs; admin-vjt has no bind and
        # can't be targeted as a "real" disconnect because the M-9a
        # cannot_disconnect_self 422 gate fires). Pre-seed at compose
        # time so Bootstrap spawns the Session.Server before the
        # Playwright suite starts.
        mix grappa.create_user --name m9b-test --password test-password-not-secret
        mix grappa.bind_network --user m9b-test --network bahamut-test \
          --server bahamut-test:6667 --no-tls --nick m9b-grappa \
          --auth none --autojoin '#bofh'
        # GREEN-CI batch-1 — sacrificial-user for the destructive admin
        # specs (m9b Disconnect/Terminate, u5 Terminate). Disconnect
        # parks the credential; Terminate kills the pid. Each spec
        # PATCHes /networks first to reconnect (idempotent) so the row
        # is guaranteed live before the destructive verb fires. vjt
        # and m9b-test stay alive for downstream specs.
        mix grappa.create_user --name m9b-victim --password test-password-not-secret
        mix grappa.bind_network --user m9b-victim --network bahamut-test \
          --server bahamut-test:6667 --no-tls --nick m9b-victim-grappa \
          --auth none --autojoin '#bofh'
        # GREEN-CI batch-1 — bahamut-test user cap defaults to 3, which
        # is exactly the seeded-user count (vjt + m9b-test + m9b-victim).
        # The victim-reconnect PATCH in destructive specs would 503
        # `network_busy` if a prior spec's parked session hadn't yet
        # dropped its registry slot. Bump to 10 so the destructive-spec
        # reconnect-then-kill dance has headroom; the U-cluster spec
        # which exercises the cap-saturation 503 boundary explicitly
        # PATCHes its own caps in setup, so this baseline doesn't
        # conflict with it.
        mix grappa.set_network_caps --network bahamut-test --max-user-sessions 10
        # M-cluster M-8 — visitor mint endpoint (`POST /auth/login`
        # with `{identifier: nick}`) requires a VISITOR-ENABLED
        # Networks.Network row PLUS at least one Server row so the visitor
        # session can spawn an upstream IRC connection.
        #
        # #211 phase 3 — the compile-time `:visitor_network` pin is GONE:
        # which networks accept visitors is now the runtime DB flag
        # `networks.visitor_enabled`, read by login via
        # `Networks.list_visitor_enabled/0`. So the seeded "azzurra"
        # network MUST be created with `visitor_enabled: true` (via the
        # idempotent `find_or_create_network/1`) or every visitor spec
        # 503s `network_unconfigured` at login. Points at the same
        # bahamut-test leaf. No credential bind here — visitor minting
        # provisions its own anon visitor rows (+ their per-network
        # Credential via the phase-3 write-through) at request time.
        #
        # #171: `max_per_ip: 100` is deliberate headroom, not a real
        # limit. The per-(source-IP, network) clone cap reuses
        # `max_per_ip`, and the serial Playwright runner drives many
        # visitor logins through ONE shared source IP (runner → nginx →
        # grappa). At the production default (1) the 2nd concurrent
        # visitor on the shared IP would 503 `too_many_sessions`,
        # regressing unrelated specs. Specs that need a tight cap set it
        # explicitly and restore to 100 (issue171 spec, u-4).
        mix run -e '{:ok, _net} = Grappa.Networks.find_or_create_network(%{slug: "azzurra", visitor_enabled: true, max_concurrent_visitor_sessions: 100, max_per_ip: 100})'
        mix grappa.add_server --network azzurra --server bahamut-test:6667 --no-tls
    networks:
      grappa-e2e: {}

  grappa-test:
    build:
      context: ../..
      args:
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        CONTAINER_GID: ${CONTAINER_GID:-1000}
    image: grappa:e2e
    pull_policy: never
    container_name: grappa-e2e-grappa
    hostname: grappa-test
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    depends_on:
      hub:
        condition: service_healthy
      # NOTE: deliberately NO `depends_on grappa-e2e-seeder
      # service_completed_successfully` here. With the dep declared,
      # `compose up grappa-test --wait` re-starts the (already-exited
      # zero) seeder a SECOND time, which fails on the duplicate user
      # row and trips the whole stack. The seeder is orchestrated
      # entirely from scripts/integration.sh's two-phase boot sequence
      # (phase 1: `up --wait grappa-e2e-seeder`; phase 2: `up --wait
      # grappa-test ...`) so this dep is enforced by the wrapper, not
      # compose semantics.
    volumes:
      # Bind-mount source from the worktree root (../..). Same shape as
      # compose.yaml — live source, not a release. Named volumes for
      # _build / deps / .mix / .hex were dropped post-CP23 S1: the
      # single-stage `mix phx.server` model never runs as root, and
      # named volumes initialise root-owned (memory
      # `feedback_named_volume_uid_trap`), tripping the dropped UID's
      # writes to deps/_build. Bind-mount inherits operator UID, no
      # collision.
      - ../..:/app
      # Per-stack runtime (sqlite). Host bind-mount under
      # runtime/e2e/grappa-runtime so the directory ownership matches
      # the operator's UID — same gotcha as bun-cache + cicchetto-dist
      # (see cicchetto-build-test): a fresh named volume is root-owned
      # and the container drops to UID 1000, causing the sqlite open
      # to fail with `database_open_failed`. Bind-mount inherits the
      # host UID via Docker Desktop's translation on macOS / direct
      # uid-match on Linux.
      - ../../runtime/e2e/grappa-runtime:/app/runtime
    environment:
      MIX_ENV: dev
      ELIXIR_ERL_OPTIONS: "+fnu"
      # Captcha disabled — the test suite drives signup directly via
      # mix tasks; the captcha gate is a separate spec when it lands.
      GRAPPA_CAPTCHA_PROVIDER: disabled
      # Public-origin fidelity (media-link viewer, 2026-06-11): the
      # runtime.exs PHX_HOST block roots Endpoint.url() at
      # https://nginx-test so minted upload URLs match the page origin
      # the Playwright runner browses — same shape as prod, where
      # PHX_HOST roots them at the public https host.
      PHX_HOST: nginx-test
    command: ["mix", "phx.server"]
    networks:
      grappa-e2e:
        # Alias so nginx-test can reach us via the same `grappa`
        # hostname the prod nginx.conf hardcodes — lets us reuse
        # infra/nginx.conf verbatim (production fidelity), no e2e-
        # specific nginx config drift.
        aliases: [grappa, grappa-test]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  cicchetto-build-test:
    image: oven/bun:1
    # Use the operator's UID/GID so writes to the bind-mounted host
    # cache dir + the dist named volume match host ownership. Mirrors
    # scripts/bun.sh's --user pattern. CONTAINER_UID/GID are exported
    # by scripts/integration.sh on Linux; on macOS they default to
    # 1000 and Docker Desktop's bind-mount layer translates ownership
    # transparently — the cache works either way because it lives in
    # a host bind-mount that already exists with the operator's UID
    # (see scripts/integration.sh's mkdir -p in the prelude).
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    volumes:
      - ../../cicchetto:/app
      # Host bind-mount for the bun install cache, shared with the
      # dev `scripts/bun.sh` cache at runtime/bun-cache. Named volume
      # would be root-owned on first create → AccessDenied under the
      # dropped UID; bind-mount inherits the operator's ownership.
      - ../../runtime/bun-cache:/cache
      # Host bind-mount for the dist output too — same reason. Lives
      # under runtime/e2e/cicchetto-dist (separate from the prod
      # deploy's runtime/cicchetto-dist so they can't collide).
      - ../../runtime/e2e/cicchetto-dist:/app/dist
    tmpfs:
      - /tmp:exec,uid=${CONTAINER_UID:-1000},gid=${CONTAINER_GID:-1000}
    environment:
      HOME: /tmp
      BUN_INSTALL_CACHE_DIR: /cache
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run build"]

  # nginx-cert-init — push notifications cluster B5 (2026-05-14).
  # Generates a throwaway self-signed cert for nginx-test's :443
  # listener so the cic SW + Push API + Notification API have a
  # secure context to register against. Idempotent: subsequent
  # `up` runs reuse the existing cert. See
  # nginx-certs/gen-cert.sh moduledoc for why TLS is the
  # canonical path (chromium HTTP treat-as-secure flag does not
  # honor Playwright's launch shape).
  nginx-cert-init:
    image: alpine:3.20
    user: "0:0"
    volumes:
      - ./nginx-certs:/certs
    command: ["/bin/sh", "/certs/gen-cert.sh"]

  nginx-test:
    image: nginx:alpine
    container_name: grappa-e2e-nginx
    hostname: nginx-test
    depends_on:
      grappa-test:
        condition: service_healthy
      cicchetto-build-test:
        condition: service_completed_successfully
      nginx-cert-init:
        condition: service_completed_successfully
    volumes:
      - ./nginx-test.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/snippets:/etc/nginx/snippets:ro
      - ./nginx-certs:/etc/nginx/certs:ro
      - ../../runtime/e2e/cicchetto-dist:/usr/share/nginx/html:ro
    networks:
      grappa-e2e:
        aliases: [nginx-test]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 30

  # The runner. Official Playwright base image (Node + chromium/
  # firefox/webkit preinstalled). Has direct docker-network access to
  # hub (`bahamut-test:6667` via the hub alias) and nginx-test
  # (`http://nginx-test:80`). No host port publish — the runner exits
  # on its own and `--abort-on-container-exit` tears the whole stack
  # down with it.
  playwright-runner:
    build:
      context: .
      dockerfile: ./runner/Dockerfile
    container_name: grappa-e2e-runner
    depends_on:
      nginx-test:
        condition: service_healthy
      push-catcher:
        condition: service_healthy
    volumes:
      # Source mount so spec edits hot-reload without rebuild.
      - .:/work
      # Preserve the image's pre-installed node_modules over the
      # bind-mount above. Without this, `.:/work` overlays /work
      # entirely, hiding the npm install done at build time, and
      # Playwright fails with "Cannot find package '@playwright/
      # test'". Named volume seeds itself from the image on first
      # mount.
      - e2e_runner_node_modules:/work/node_modules
      # Persist Playwright HTML reports + traces to host for post-
      # mortem (test-results/ + playwright-report/ — gitignored at
      # cicchetto/e2e/.gitignore).
      - ./test-results:/work/test-results
      - ./playwright-report:/work/playwright-report
      # UX-6-I.2 (2026-05-22) — real-bundle-swap fixture mounts the
      # cic dist tree RW so the swap fixture can rewrite index.html +
      # drop a synthetic bundle B asset mid-spec. nginx-test mounts
      # the same host path RO (line ~301); the host file is the single
      # source of truth, both containers see the same bytes. See
      # cicchetto/e2e/fixtures/bundleSwap.ts.
      - ../../runtime/e2e/cicchetto-dist:/work/dist-test
    working_dir: /work
    environment:
      CI: "1"
      # The base URL specs hit. `nginx-test` resolves via the docker
      # bridge (alias defined on the nginx-test service above). HTTPS
      # is required for the cic SW + Push API + Notification API to
      # surface (push notifications cluster B5, 2026-05-14) — the
      # nginx-test container exposes both :80 (legacy specs) and
      # :443 (self-signed cert via nginx-certs).
      E2E_BASE_URL: https://nginx-test
      # Hub address for ircClient.ts fixture — talks plain IRC to the
      # bahamut-test alias.
      E2E_IRC_HOST: bahamut-test
      E2E_IRC_PORT: "6667"
      # Verbose IRC peer wire-trace. Off by default; flip to "1" for
      # debugging registration / nick collision / throttle issues.
      E2E_PEER_DEBUG: "0"
      # Push notifications cluster B5 (2026-05-14) — base URL the
      # push-trigger specs use for both (a) constructing the fake
      # PushSubscription endpoint cic registers and (b) polling
      # `/received/<id>` to confirm Sender's HTTP POST landed.
      # See push-catcher/server.mjs for the path scheme.
      E2E_PUSH_CATCHER_URL: http://push-catcher:3000
    networks:
      grappa-e2e: {}
    command: ["npx", "playwright", "test"]

  # Push notifications cluster B5 (2026-05-14) — fake Web Push vendor
  # for the e2e push-trigger specs. See push-catcher/server.mjs
  # for the rationale (no real FCM / Mozilla autopush reachable from
  # the integration network; sidecar plays the vendor role with zero
  # production-code surface). Stdlib-only node server, no npm install.
  push-catcher:
    build:
      context: ./push-catcher
    image: grappa-e2e-push-catcher:dev
    container_name: grappa-e2e-push-catcher
    pull_policy: never
    networks:
      grappa-e2e:
        aliases: [push-catcher]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10

volumes:
  e2e_runner_node_modules:

networks:
  # Single shared bridge so runner can reach grappa-test, nginx-test,
  # and hub (via the alias declared on hub's `networks:` override
  # above). The testnet's internal svc-net / leaf4-net / leaf6-net
  # bridges keep doing their S2S job — those are inherited from
  # infra/compose.yaml unchanged. We just add hub to one more bridge
  # (grappa-e2e) so it's reachable from grappa-test + the runner.
  grappa-e2e:
    driver: bridge
