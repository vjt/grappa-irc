# nginx config for e2e nginx-test — push notifications cluster B5
# (2026-05-14).
#
# Mirrors infra/nginx.conf (the prod surface) and adds a :443 TLS
# server block backed by a throwaway self-signed cert (generated by
# nginx-certs/gen-cert.sh). Required so the cic SW + Push API
# + Notification API have a secure context to register against
# (the W3C spec gates these on isSecureContext; chromium HTTP
# treat-as-secure flag does NOT work under Playwright's launch
# shape — see nginx-certs/gen-cert.sh moduledoc).
#
# The :80 listener stays for backwards-compat with non-push specs
# that still hit `http://nginx-test`. Push specs explicitly use
# `https://nginx-test` via E2E_BASE_URL on the runner.
#
# Both server blocks `include /etc/nginx/snippets/locations-api.conf`
# — the single source of truth shared with `infra/nginx.conf`. The
# snippets directory is mounted into the e2e nginx container via the
# `../../infra/snippets:/etc/nginx/snippets:ro` bind in
# cicchetto/e2e/compose.yaml. Adding a new admin resource or REST
# allowlist entry is a one-file edit (H19 from 2026-05-22 codebase
# review) — no longer three-places-must-stay-in-lockstep.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    upstream grappa_upstream {
        server grappa:4000;
        keepalive 32;
    }

    # :80 — plain HTTP, retained for backwards-compat with non-push
    # specs that still hit `http://nginx-test`.
    server {
        listen 80 default_server;
        server_name _;

        # Shared snippet no longer sets root/index (substrate-specific
        # — Docker bind-mounts /usr/share/nginx/html, FreeBSD jail
        # uses /usr/local/www/cic). Set it here for the e2e surface.
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/locations-api.conf;
    }

    # :443 — TLS, throwaway self-signed cert. Push specs hit this
    # surface via E2E_BASE_URL=https://nginx-test on the runner.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/locations-api.conf;
    }
}
