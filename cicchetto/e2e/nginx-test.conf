# nginx config for e2e nginx-test — push notifications cluster B5
# (2026-05-14).
#
# Mirrors infra/nginx.conf (the prod surface) and adds a :443 TLS
# server block backed by a throwaway self-signed cert (generated by
# nginx-certs/gen-cert.sh). Required so the cic SW + Push API
# + Notification API have a secure context to register against
# (the W3C spec gates these on isSecureContext; chromium HTTP
# treat-as-secure flag does NOT work under Playwright's launch
# shape — see nginx-certs/gen-cert.sh moduledoc).
#
# The :80 listener stays for backwards-compat with non-push specs
# that still hit `http://nginx-test`. Push specs explicitly use
# `https://nginx-test` via E2E_BASE_URL on the runner.
#
# Why duplicate the prod nginx.conf instead of including it: nginx
# `include` of a file containing a `server { }` block at the http{}
# level is permitted, but the location rules inside need to live
# inside both server blocks — and snippet-mounting a file inside a
# read-only directory mount fails at runtime (overlay can't create a
# nested mount-point). Inlining the locations once per server block
# is the cheapest readable path. Keep in lockstep with
# infra/nginx.conf when adding routes.
worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    upstream grappa_upstream {
        server grappa:4000;
        keepalive 32;
    }

    # :80 — plain HTTP, retained for backwards-compat with non-push
    # specs that still hit `http://nginx-test`.
    server {
        listen 80 default_server;
        server_name _;

        # UX-6-B1 (2026-05-20): mirror prod nginx body-size ceiling for
        # the embedded image uploader (`POST /api/uploads`).
        client_max_body_size 100m;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/security-headers.conf;

        location /socket {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            access_log off;
        }

        location ~ ^/(auth|me|networks|push|api|uploads|healthz)(/|$) {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # M-cluster admin REST allowlist — operator console surface.
        # Mirror of infra/nginx.conf. M-9b added /sessions alongside
        # M-3's /visitors. Loopback-only verbs (/reload,
        # /cic-bundle-changed) are NOT in this regex so they stay
        # unreachable through nginx.
        location ~ ^/admin/(visitors|sessions|credentials|networks|reaper|circuit|users|me|settings|uploads)(/|$) {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            include /etc/nginx/snippets/security-headers.conf;
            try_files $uri =404;
        }

        location / {
            try_files $uri /index.html;
        }
    }

    # :443 — TLS, throwaway self-signed cert. Push specs hit this
    # surface via E2E_BASE_URL=https://nginx-test on the runner.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # UX-6-B1 (2026-05-20): mirror prod nginx body-size ceiling for
        # the embedded image uploader (`POST /api/uploads`).
        client_max_body_size 100m;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/security-headers.conf;

        location /socket {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            access_log off;
        }

        location ~ ^/(auth|me|networks|push|api|uploads|healthz)(/|$) {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # M-cluster admin REST allowlist — see :80 block above.
        location ~ ^/admin/(visitors|sessions|credentials|networks|reaper|circuit|users|me|settings|uploads)(/|$) {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            include /etc/nginx/snippets/security-headers.conf;
            try_files $uri =404;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
