# grappa — unified compose (dev + prod via profiles, single image).
#
# CP23 cluster `cluster/code-reload` collapsed compose.yaml +
# compose.prod.yaml into this one file. `mix phx.server` boots in
# every environment; MIX_ENV is the only env-distinguishing variable.
#
# Run dev (default — no profile, grappa-only):
#   docker compose up
#
# Run prod (adds nginx + cicchetto-build oneshot):
#   MIX_ENV=prod docker compose --profile prod up -d
#
# Run mix tasks: scripts/mix.sh test
# Run iex shell: scripts/iex.sh
# Tail logs:     scripts/monitor.sh
#
# Personal bindings (LAN/VLAN IP for inbound, $PHX_HOST) live in
# `compose.override.yaml` — gitignored, auto-loaded by scripts/_lib.sh
# when present. See `compose.override.yaml.example`.
#
# Default publish: GRAPPA_PUBLISH=127.0.0.1:4000 — bouncer reachable
# only on loopback. Operator overrides via env or override file to bind
# to a LAN/VLAN IP, all interfaces (`0.0.0.0:4000`), or a different port.
# In prod this is typically left untouched (loopback-only) and nginx
# (the only LAN-facing service) reverse-proxies to it via the
# grappa_internal bridge.

services:
  grappa:
    build:
      context: .
    image: grappa:latest
    pull_policy: never
    container_name: grappa
    hostname: grappa
    restart: unless-stopped
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    ports:
      - "${GRAPPA_PUBLISH:-127.0.0.1:4000}:4000"
    networks:
      - grappa_internal
    volumes:
      # Bind-mount the whole project for live-reload dev + hot-reload
      # prod workflow. Same source layout in both modes — the cluster's
      # design pin: `mix phx.server` reads compiled artifacts from the
      # bind-mounted tree on every boot, so a `git pull` + admin reload
      # POST swaps modules without restarting the container.
      #
      # `_build/`, `deps/`, `.mix/`, `.hex/` all live inside the
      # bind-mounted tree. Previously named volumes shadowed them to
      # protect against host-arch artifact contamination — but since
      # the host never runs mix (per CLAUDE.md "the container IS the
      # runtime"), there's nothing to contaminate. Using bind mounts
      # avoids the named-volume root-owned-init permission trap (fresh
      # named volume = root, container drops to UID 1000, can't write).
      # The image is toolchain-only (#364 docker S1 — it can't bake deps
      # under a path this mount shadows), so on a fresh clone bin/start.sh
      # installs hex + deps into this tree on first boot.
      - ./:/app
      # Per-env state lives in runtime/ (sqlite, logs).
      - ./runtime:/app/runtime
    environment:
      MIX_ENV: ${MIX_ENV:-dev}
      DATABASE_PATH: /app/runtime/grappa_${MIX_ENV:-dev}.db
      # Prod-required (no defaults — runtime.exs raises if missing in
      # MIX_ENV=prod). The `:-` (empty default) form below leaves these
      # unset in dev where config/dev.exs fixed values cover them; in
      # prod the host shell / .env MUST export real values or
      # runtime.exs surfaces the missing-env error at boot.
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      SECRET_SIGNING_SALT: ${SECRET_SIGNING_SALT:-}
      GRAPPA_ENCRYPTION_KEY: ${GRAPPA_ENCRYPTION_KEY:-}
      PHX_HOST: ${PHX_HOST:-}
      EXTRA_CHECK_ORIGINS: ${EXTRA_CHECK_ORIGINS:-}
      # BEAM resource caps (see bin/start.sh). Unset → defaults applied
      # (GRAPPA_MAX_USERS=100, GRAPPA_DIRTY_SCHEDULERS=$(nproc)).
      GRAPPA_MAX_USERS: ${GRAPPA_MAX_USERS:-}
      GRAPPA_DIRTY_SCHEDULERS: ${GRAPPA_DIRTY_SCHEDULERS:-}
      # T31 Plan 2 — admission captcha. Defaults to disabled provider;
      # operator exports GRAPPA_CAPTCHA_PROVIDER=turnstile + secret +
      # site_key in .env / host shell to enable.
      GRAPPA_CAPTCHA_PROVIDER: ${GRAPPA_CAPTCHA_PROVIDER:-disabled}
      GRAPPA_CAPTCHA_SITE_KEY: ${GRAPPA_CAPTCHA_SITE_KEY:-}
      GRAPPA_CAPTCHA_SECRET: ${GRAPPA_CAPTCHA_SECRET:-}
      # Push notifications cluster B2 (2026-05-14) — VAPID keypair for
      # Web Push delivery. Bootstrap raises in MIX_ENV=prod when either
      # PUBLIC or PRIVATE is missing. VAPID_SUBJECT defaults to
      # mailto:admin@example.org server-side. Generate with
      # `scripts/mix.sh grappa.gen_vapid` and pin in
      # compose.override.yaml or host .env.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # T-2: Erlang distribution cookie for `bin/grappa remote-shell`.
      # Dev default lets `docker compose up` work clone-and-go; runtime.exs
      # raises in prod if this is unset or equals the sentinel below.
      # See .env.example for the threat model + rotation guidance.
      RELEASE_COOKIE: ${RELEASE_COOKIE:-grappa-dev-cookie-do-not-use-in-prod}
      # UX-6-B1 (2026-05-20): embedded image uploader storage dir.
      # Defaults to `runtime/uploads` (under the bind-mounted runtime/
      # so the existing host volume covers it). Override only if
      # disk-policy requires a separate volume.
      UPLOADS_STORAGE_ROOT: ${UPLOADS_STORAGE_ROOT:-/app/runtime/uploads}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      # Probe early + often. First boot on a fresh clone is the slow one:
      # bin/start.sh fetches deps (toolchain image, #364 docker S1) and
      # `mix phx.server` then compiles from the bind-mounted source with
      # no `_build/${MIX_ENV}/` cached on host disk yet — allow a few
      # minutes. start_period suppresses failure-counts-toward-unhealthy
      # during that window; the healthy-flip happens on the first /healthz
      # 200 regardless. Warm reboots (deps + _build already on disk) finish
      # in seconds.
      start_period: 180s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Oneshot service — builds cicchetto's static SPA into
  # ./runtime/cicchetto-dist on the host. scripts/deploy.sh runs this
  # explicitly via `compose run --rm` before bringing up nginx, so dist/
  # is always fresh on every deploy. The depends_on below is the safety
  # net for a manual `compose --profile prod up` (compose will run the
  # dep to completion before starting nginx).
  #
  # Why a host bind-mount instead of a named volume: a fresh Docker
  # named volume is root:root, but the container drops to UID 1000 (so
  # node_modules + bun.lock writes to the bind-mounted ./cicchetto/
  # don't land as root on the host filesystem). Container-as-1000 +
  # named-volume-as-root collides on Vite's prepare-out-dir step
  # (EACCES on copyfile to /app/dist/). Host bind-mount with deploy.sh's
  # `mkdir -p` (default ownership inherits from the operator's UID,
  # which IS 1000 on the canonical deployment) sidesteps the collision
  # and makes dist/ inspectable from the host.
  cicchetto-build:
    profiles: [prod]
    image: oven/bun:1
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    volumes:
      - ./cicchetto:/app
      - ./runtime/bun-cache:/cache
      - ./runtime/cicchetto-dist:/app/dist
    tmpfs:
      # UID/GID must track the `user:` field above — bun writes to
      # HOME=/tmp, so a hardcoded uid=1000 tmpfs while the process runs
      # as CONTAINER_UID!=1000 fails every write with EACCES and the
      # `bun install && bun run build` never completes (nginx's
      # depends_on service_completed_successfully hangs the deploy).
      - /tmp:exec,uid=${CONTAINER_UID:-1000},gid=${CONTAINER_GID:-1000}
    environment:
      HOME: /tmp
      BUN_INSTALL_CACHE_DIR: /cache
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run build"]

  nginx:
    profiles: [prod]
    image: nginx:alpine
    container_name: grappa-nginx
    hostname: grappa-nginx
    restart: always
    networks:
      - grappa_internal
    ports:
      - "${NGINX_PUBLISH:-3000:80}"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/snippets:/etc/nginx/snippets:ro
      - ./runtime/cicchetto-dist:/usr/share/nginx/html:ro
    depends_on:
      grappa:
        condition: service_started
      cicchetto-build:
        condition: service_completed_successfully
    healthcheck:
      # 127.0.0.1, not localhost: alpine resolves localhost to ::1 first
      # but nginx.conf only declares `listen 80` (IPv4 wildcard), not
      # `listen [::]:80`, so the IPv6 connect refuses → healthcheck fails.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  grappa_internal:
    driver: bridge
