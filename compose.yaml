# grappa — dev compose
#
# Run dev:           docker compose up
# Run dev detached:  docker compose up -d
# Run mix tasks:     scripts/mix.sh test
# Run iex shell:     scripts/iex.sh
# Tail logs:         scripts/monitor.sh
#
# Phoenix listens on 4000 inside the container and is published on the host
# (wildcard) at :4000. Browse at http://localhost:4000.
#
# Deployment-specific bindings (e.g. binding to a LAN/VLAN IP only) live in
# `compose.override.yaml` — gitignored, auto-loaded by scripts/_lib.sh when
# present. See `compose.override.yaml.example`.
#
# For prod: see compose.prod.yaml (separate file, not an override).

services:
  grappa:
    build:
      context: .
      target: build
      args:
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        CONTAINER_GID: ${CONTAINER_GID:-1000}
    image: grappa:dev
    pull_policy: never
    container_name: grappa
    hostname: grappa
    restart: unless-stopped
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      # Bind-mount the whole project for live-reload dev workflow.
      - ./:/app
      # Hide host /app/deps and /app/_build with named volumes so the
      # container-arch compiled artifacts don't clash with anything on the host.
      - grappa_deps:/app/deps
      - grappa_build:/app/_build
      - grappa_mix:/app/.mix
      - grappa_hex:/app/.hex
      # Per-env state lives in runtime/ (sqlite, logs, plt cache).
      - ./runtime:/app/runtime
    environment:
      MIX_ENV: ${MIX_ENV:-dev}
      DATABASE_PATH: /app/runtime/grappa_dev.db
      ELIXIR_ERL_OPTIONS: "+fnu"  # filename UTF-8 mode (avoids Erlang locale warnings)
      # T31 Plan 2 — admission captcha. Mirrors compose.prod.yaml so dev
      # exercises the same runtime.exs env-var → :grappa, :admission
      # propagation as prod. Defaults to disabled provider; operator can
      # export GRAPPA_CAPTCHA_PROVIDER=turnstile + secret/site_key in
      # the host shell to test live verification end-to-end.
      GRAPPA_CAPTCHA_PROVIDER: ${GRAPPA_CAPTCHA_PROVIDER:-disabled}
      GRAPPA_CAPTCHA_SITE_KEY: ${GRAPPA_CAPTCHA_SITE_KEY:-}
      GRAPPA_CAPTCHA_SECRET: ${GRAPPA_CAPTCHA_SECRET:-}
    command: ["mix", "phx.server"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  grappa_deps:
  grappa_build:
  grappa_mix:
  grappa_hex:
