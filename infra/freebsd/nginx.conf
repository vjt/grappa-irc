# grappa — nginx config for the FreeBSD bastille jail.
#
# Mirrors infra/nginx.conf (the Docker-host config) but adapted to the
# jail layout: nginx + grappa-release + cic-bundle all live in the
# same jail filesystem, so paths are absolute (no Docker bind mounts)
# and the upstream is `127.0.0.1:4000` (same jail loopback).
#
# Host-side nginx on m42 reverse-proxies irc.sindro.me +
# irc.sniffo.org to this jail's :80 (10.66.6.7:80). TLS terminates
# at the host nginx; this jail listens HTTP only.
#
# Installed by jail_install_nginx.sh which:
#   1. cp this file → /usr/local/etc/nginx/nginx.conf
#   2. cp ../snippets/*.conf → /usr/local/etc/nginx/snippets/
#   3. ln -s /home/grappa/grappa/runtime/cicchetto-dist → /usr/local/www/cic
#   4. sysrc nginx_enable=YES
#   5. service nginx start

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    upstream grappa_upstream {
        server 127.0.0.1:4000;
        keepalive 32;
    }

    # Bind to the jail's external v4 so the host nginx can proxy here.
    # The jail also holds 6 public v6 addresses, but inbound from the
    # host nginx travels via the loopback-attached lo1/10.66.6.7
    # bridge.
    server {
        listen 10.66.6.7:80 default_server;
        server_name _;

        # SPA dist path — symlinked by jail_install_nginx.sh from
        # /home/grappa/grappa/runtime/cicchetto-dist (shared anchor
        # with the Docker substrate; see Grappa.Cic.Bundle).
        # /usr/local/www is jail-writable (bastille thin-jail RO covers
        # only /usr/share).
        root /usr/local/www/cic;
        index index.html;

        # All routing rules live in the snippet shared with the Docker
        # path — single source of truth for REST allowlist, admin
        # allowlist, /socket WS upgrade, SPA fallback.
        include snippets/locations-api.conf;
    }
}
