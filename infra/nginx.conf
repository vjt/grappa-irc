# grappa — nginx reverse proxy + SPA host (prod only)
#
# Single user-facing surface for the bouncer + cicchetto PWA. Listens on
# :80 inside the container; the host port-publish lives in
# compose.yaml under `--profile prod` (default `${NGINX_PUBLISH:-3000:80}`,
# overridable per-host via the gitignored compose.override.yaml). Serves
# the static SPA dist (built by the `cicchetto-build` oneshot under the
# same `--profile prod` into the host bind-mount at `runtime/cicchetto-dist/`)
# and reverse-proxies the bouncer's REST + WS surface to grappa:4000
# (resolved via the grappa-net Docker bridge that nginx and grappa both
# join).
#
# Per-host overrides (LAN IP binding, alternative PHX_HOST, captcha-
# provider CSP entries) live in `compose.override.yaml` —
# template at `compose.override.yaml.example`. Don't hardcode hostnames
# or LAN bindings here; CSP `'self'` covers same-origin ws/wss
# automatically.
#
# Location-block surface is hoisted into `infra/snippets/locations-api.conf`
# so the prod surface (this file) and the e2e surface
# (`cicchetto/e2e/nginx-test.conf`) share one source of truth — a new
# admin resource, REST allowlist entry, or location-level header is a
# ONE-FILE edit (H19 from the 2026-05-22 codebase review).

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # nginx default Authorization-header behavior is passthrough — no
    # explicit proxy_set_header Authorization needed for the API allowlist
    # below. proxy_pass forwards client headers verbatim unless overridden.

    upstream grappa_upstream {
        server grappa:4000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # SPA dist path — bind-mounted from the host at
        # runtime/cicchetto-dist via compose.yaml `--profile prod`.
        # Moved out of the shared snippet (which used to set this)
        # because the FreeBSD jail substrate needs a different path
        # (bastille thin-jail RO on /usr/share).
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/locations-api.conf;
    }
}
