# grappa — nginx reverse proxy + SPA host (prod only)
#
# Single user-facing surface for the bouncer + cicchetto PWA. Listens on
# :80 (vlan53 192.168.53.11 — see compose.prod.yaml). Serves the static
# SPA dist (built by the cicchetto-build compose service into the
# cicchetto_dist named volume) and reverse-proxies the bouncer's REST +
# WS surface to grappa:4000 (resolved via the grappa_internal Docker
# bridge that nginx and grappa both join).
#
# WS upgrade is required for /socket (Phoenix Channels) — see the
# Upgrade/Connection headers + HTTP/1.1 below. The other API routes
# (/auth /me /networks /healthz) are plain HTTP request/response.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # nginx default Authorization-header behavior is passthrough — no
    # explicit proxy_set_header Authorization needed for the API allowlist
    # below. proxy_pass forwards client headers verbatim unless overridden.

    upstream grappa_upstream {
        server grappa:4000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers, applied to every response (including error
        # pages) via `always`. CSP is the realistic XSS mitigation for
        # the bearer-in-localStorage design — the auth.ts module-level
        # comment names this as the load-bearing defense; this is where
        # it lands on the wire.
        #
        # CSP allowlist:
        #   * default-src 'self'         — same-origin only baseline
        #   * connect-src 'self' ws: wss: https://challenges.cloudflare.com
        #     — REST + WS to grappa upstream (same origin); ws/wss
        #     schemes covered for cross-scheme WS in case the Phase 5
        #     TLS rollout transitions in stages; Cloudflare Turnstile
        #     posts captcha verification XHRs to challenges.cloudflare.com
        #   * script-src 'self' https://challenges.cloudflare.com
        #     — Vite-bundled modules + Cloudflare Turnstile widget
        #     loader (api.js); no inline. T31 admission flow needs
        #     Turnstile JS to render the captcha challenge in the
        #     cicchetto Login page
        #   * frame-src https://challenges.cloudflare.com — Turnstile
        #     renders the challenge inside an iframe pointing at
        #     Cloudflare's hosted widget; without this directive the
        #     iframe is blocked and the captcha never appears
        #   * style-src 'self' 'unsafe-inline' — SolidJS components ship
        #     dynamic style tags during interactive renders; rejecting
        #     'unsafe-inline' would break the irssi-shape theme system
        #   * img-src 'self' data:        — favicons + manifest icons +
        #     SolidJS-emitted inline data: SVGs
        #   * font-src 'self'             — system fonts only
        #   * manifest-src 'self'         — PWA install manifest
        #   * worker-src 'self'           — /sw.js shell-cache worker
        #   * frame-ancestors 'none'      — no embedding (clickjacking)
        #   * base-uri 'self'             — block <base> URL injection
        #   * form-action 'self'          — block form-jacking
        #
        # X-Content-Type-Options nosniff stops MIME-sniffing attacks
        # against served assets; Referrer-Policy same-origin avoids
        # leaking the canonical hostname to outbound clicks (cicchetto
        # has none yet, but defense in depth); Permissions-Policy
        # disables device APIs the bouncer never asks for.
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss: https://challenges.cloudflare.com; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; worker-src 'self'; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

        # Phoenix Channels WS endpoint. Upgrade/Connection + HTTP/1.1
        # are the WebSocket handshake; without them Phoenix never sees
        # the upgrade and the channel stays HTTP-only (no realtime).
        location /socket {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Long-lived WS — disable proxy timeouts that would chop
            # idle connections (Phoenix's heartbeat keeps it warm).
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            # The WS upgrade URL carries the bearer token as `?token=…`
            # (Phoenix.Socket transports params via query string).
            # Suppress the access log so the bearer doesn't surface in
            # nginx stdout / Docker JSON logs. Phoenix's connect log line
            # is filtered separately via `:phoenix, :filter_parameters`.
            access_log off;
        }

        # REST API allowlist — explicit so future routes don't get
        # auto-exposed. /healthz is in here so deploy.sh + external
        # probes can hit it through nginx.
        location ~ ^/(auth|me|networks|healthz)(/|$) {
            proxy_pass http://grappa_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service Worker — never cache. iOS Safari + the SW spec cap
        # registration HTTP cache at 24h, but RFC heuristics on Last-
        # Modified/ETag can extend that further if upstream sets neither.
        # Forcing no-cache means a re-deploy of `dist/` propagates the
        # new SW on the next page load, not whenever the operator's
        # browser feels like checking. `add_header` here re-asserts the
        # security header set because nginx's add_header inheritance
        # stops at the first `add_header` in a more specific block.
        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss: https://challenges.cloudflare.com; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; worker-src 'self'; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
            try_files $uri =404;
        }

        # SPA — try the literal path on disk, fall back to index.html
        # so client-side routes (/login etc.) survive a hard refresh.
        location / {
            try_files $uri /index.html;
        }
    }
}
