# grappa — security headers snippet
#
# Included from infra/nginx.conf wherever a security-header set is
# needed (currently: the default `/` location AND the `location =
# /sw.js` override). nginx's `add_header` inheritance stops at the
# first `add_header` in a more-specific block, so the SW location
# can't rely on parent-level headers — every location that overrides
# Cache-Control must re-assert the full security set. Hoisting to
# this snippet means a header edit is a single change instead of
# two-files-must-stay-in-lockstep.
#
# Mounted into the nginx container at /etc/nginx/snippets/ via the
# nginx service `volumes:` block in compose.yaml (under `--profile prod`).
#
# CSP allowlist:
#   * default-src 'self'         — same-origin only baseline
#   * connect-src 'self' https://challenges.cloudflare.com
#                       https://*.hcaptcha.com
#                       https://litterbox.catbox.moe
#     — REST + WS to grappa upstream (same-origin: 'self' covers
#     ws://$host and wss://$host automatically per CSP3, so the
#     directive is deployment-hostname agnostic — no edit needed when
#     PHX_HOST changes); Cloudflare Turnstile posts captcha
#     verification XHRs to challenges.cloudflare.com; hCaptcha posts
#     verification + telemetry XHRs to hcaptcha.com + assets.hcaptcha.com;
#     litterbox.catbox.moe receives the multipart upload XHR from
#     cic's image-upload feature (images cluster 2026-05-15 I-CSP).
#     The response URL host is `litter.catbox.moe` (empirically
#     verified during I-CSP) but it does NOT need an `img-src` entry
#     — cic never renders the image; the user clicks the link, the
#     browser opens it in a new tab as its own document load
#     completely outside our CSP. IRC stays text only (see CLAUDE.md
#     Engineering Standards).
#   * script-src 'self'
#         'sha256-ZswfTY7H35rbv8WC7NXBoiC7WNu86vSzCDChNWwZZDM='
#         https://challenges.cloudflare.com https://*.hcaptcha.com
#     — Vite-bundled modules + Cloudflare Turnstile widget loader
#     (api.js) + hCaptcha widget loader (js.hcaptcha.com/1/api.js). The
#     provider's widget loader does NOT just run from its host: once
#     api.js executes it injects a small INLINE bootstrap <script> into
#     the document, which `script-src` blocks unless that exact script
#     is allowlisted. We pin it by sha256 (CSP3 hash-source) rather than
#     relax to 'unsafe-inline' — keeping our own first-party inline
#     scripts forbidden. CAVEAT: the hash is the provider's inline
#     bootstrap content; a provider-side widget update changes the bytes
#     → new hash → the captcha silently fails CSP again. When that
#     happens the browser console prints the new
#     `sha256-…` to add here (do NOT switch to 'unsafe-inline').
#     T31 admission flow + cic captcha provider list both surface
#     hcaptcha as a selectable provider; without `*.hcaptcha.com` here
#     the hcaptcha widget loader 404s under CSP and the operator sees
#     the misleading "ad-blocker" message that fires on any
#     captcha-script load failure (codebase review 2026-05-12 cic H2
#     root cause).
#   * frame-src https://challenges.cloudflare.com
#                https://*.hcaptcha.com
#     — Turnstile + hCaptcha both render the challenge inside an
#     iframe pointing at the provider's hosted widget; without these
#     directives the iframe is blocked and the captcha never appears.
#   * style-src 'self' 'unsafe-inline' https://*.hcaptcha.com
#     — SolidJS components ship dynamic style tags during interactive
#     renders; rejecting 'unsafe-inline' would break the irssi-shape
#     theme system. hCaptcha's widget loads its own stylesheet from
#     assets.hcaptcha.com; 'unsafe-inline' covers the widget's
#     injected `<style>` blocks but the externally-fetched sheet
#     needs the host explicitly.
#   * img-src 'self' data:        — favicons + manifest icons +
#     SolidJS-emitted inline data: SVGs
#   * font-src 'self'             — system fonts only
#   * manifest-src 'self'         — PWA install manifest
#   * media-src 'self' blob:      — blob: for the video-upload
#     duration probe: it loads the picked File into an off-DOM
#     <video> via URL.createObjectURL (videoPolicy.ts). Without it,
#     media falls back to default-src 'self', the blob load is
#     CSP-blocked, the probe reads null and EVERY video upload
#     degrades to the "unreadable video metadata" fallback
#     (2026-06-10 iPhone dogfood — the e2e stack carries no CSP, so
#     only prod saw it). blob: URLs are mintable by same-origin
#     script only; no remote media becomes loadable through this.
#     'self' because declaring media-src REPLACES the default-src
#     fallback: the first cut shipped bare `media-src blob:` and
#     direct navigation to /uploads/<slug> videos (the 🎬 link —
#     browsers render mp4 in a media document whose synthesized
#     <video> is governed by this very header) lost the 'self' grant
#     it previously inherited (2026-06-10, same dogfood saga).
#   * worker-src 'self' blob:     — /sw.js shell-cache worker, plus
#     mediabunny spawns its codec workers from blob: URLs
#     (media-source.js `new Worker(URL.createObjectURL(...))`) —
#     same dogfood incident, next gate down the same pipeline.
#   * frame-ancestors 'none'      — no embedding (clickjacking)
#   * base-uri 'self'             — block <base> URL injection
#   * form-action 'self'          — block form-jacking
#
# X-Content-Type-Options nosniff stops MIME-sniffing attacks against
# served assets; Referrer-Policy same-origin avoids leaking the
# canonical hostname to outbound clicks (cicchetto has none yet, but
# defense in depth); Permissions-Policy disables device APIs the
# bouncer never asks for.
add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://challenges.cloudflare.com https://*.hcaptcha.com https://litterbox.catbox.moe; script-src 'self' 'sha256-ZswfTY7H35rbv8WC7NXBoiC7WNu86vSzCDChNWwZZDM=' https://challenges.cloudflare.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://*.hcaptcha.com; img-src 'self' data:; font-src 'self'; manifest-src 'self'; media-src 'self' blob:; worker-src 'self' blob:; frame-src https://challenges.cloudflare.com https://*.hcaptcha.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "same-origin" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
