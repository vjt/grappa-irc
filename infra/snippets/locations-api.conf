# grappa — REST + WS + SPA locations snippet
#
# Single source of truth for nginx's location-block surface. Included
# from BOTH the prod surface (`infra/nginx.conf` :80) and the e2e test
# surface (`cicchetto/e2e/nginx-test.conf` :80 + :443). Adding a new
# admin resource, REST allowlist entry, or location-level header is a
# ONE-FILE edit instead of three-places-must-stay-in-lockstep (which
# was the H19 finding from the 2026-05-22 codebase review).
#
# Mounted into the nginx container at /etc/nginx/snippets/ via the
# nginx service `volumes:` block in compose.yaml (under `--profile prod`)
# and the matching mount in cicchetto/e2e/compose.yaml. The mount is
# read-only because nothing in the container should ever write here.
#
# What's NOT in here (per-server-block specifics):
#   - `listen` / `server_name` / TLS-bits — these vary per server block
#     (port, cert, http2 toggle)
#
# What IS in here:
#   - `client_max_body_size` — same ceiling on every surface
#   - `root` / `index` — same SPA dist mount
#   - `include security-headers` — once per server-block context
#   - All 5 location blocks (socket, REST allowlist, admin allowlist,
#     service-worker.js cache override, SPA fallback)
#
# The admin allowlist (M-cluster operator surface, cic AdminPane) is
# explicit per `/admin/<resource>` so future loopback-only verbs added
# under `/admin/*` (M-3 `reload`, `cic-bundle-changed`) stay
# unreachable through nginx — the loopback gate at
# `Plugs.LoopbackOnly` only fires when the request actually hits the
# BEAM, and the BEAM is upstream of nginx. `:admin_authn` (operator
# bearer + `is_admin=true`) gates these BEAM-side; nginx just routes.
# M-9b added /sessions/ alongside /visitors/. UX-6-B1 (2026-05-20)
# added /settings/ + /uploads/ for the embedded image uploader. Future
# M-10 will add /credentials/ + /circuit/ + /reaper/.

# UX-6-B1 (2026-05-20): hard ceiling on POST body size for the embedded
# uploader. nginx's default `client_max_body_size` is 1MB which would
# 413 every upload at the edge before the grappa-side dynamic per-file
# cap gets to see the request. The transport ceiling must clear the
# LARGEST admin-tunable per-type cap with margin for the multipart
# envelope (2026-06-10: a 100MiB video cap met the old 100m edge
# ceiling head-on — transport silently outranked policy). 160m pairs
# with Plug.Parsers' 128MiB multipart :length in endpoint.ex; the
# admin caps are the actual policy, this is belt-and-braces against a
# misconfigured server-side cap enabling a multi-GB DoS. Applies
# globally because the JSON / form-urlencoded surfaces all stay well
# below this (the BodyLimit plug enforces per-route ceilings further
# upstream).
client_max_body_size 160m;

# `root` + `index` MUST be set by the includer (one of the per-
# deploy nginx.conf files: infra/nginx.conf for Docker,
# infra/freebsd/nginx.conf for the bastille jail). Different
# deploy substrates pin different SPA paths — Docker bind-mounts
# /usr/share/nginx/html, the FreeBSD jail can't write to
# /usr/share (bastille thin-jail RO), so we'd need a writable
# path like /usr/local/www/cic anyway. The snippet stays
# substrate-agnostic by NOT declaring `root` here.

# Security headers, applied to every response (including error pages)
# via `always`. CSP is the realistic XSS mitigation for the bearer-in-
# localStorage design — the auth.ts module-level comment names this as
# the load-bearing defense; this is where it lands on the wire. The
# snippet is the single source of truth — both this location and
# `location = /service-worker.js` include it, since nginx's add_header
# inheritance stops at the first add_header in a more-specific block.
include snippets/security-headers.conf;

# Phoenix Channels WS endpoint. Upgrade/Connection + HTTP/1.1 are the
# WebSocket handshake; without them Phoenix never sees the upgrade and
# the channel stays HTTP-only (no realtime).
location /socket {
    proxy_pass http://grappa_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Long-lived WS — disable proxy timeouts that would chop idle
    # connections (Phoenix's heartbeat keeps it warm).
    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
    # The WS upgrade URL carries the bearer token as `?token=…`
    # (Phoenix.Socket transports params via query string). Suppress the
    # access log so the bearer doesn't surface in nginx stdout / Docker
    # JSON logs. Phoenix's connect log line is filtered separately via
    # `:phoenix, :filter_parameters`.
    access_log off;
}

# REST API allowlist — explicit so future routes don't get auto-
# exposed. /healthz is in here so deploy.sh + external probes can hit
# it through nginx. /push added 2026-05-14 for the push-notifications
# cluster B1 (subscription CRUD). /api added 2026-05-20 for UX-6-B1
# (`POST /api/uploads` + `GET /api/server-settings`). /uploads (no
# /api prefix) is the public file-fetch surface for the embedded
# uploader — short URL by design so PRIVMSG bodies stay compact.
# /session added 2026-06-29 for #126 (visitor disconnect ⇄ reconnect:
# POST /session/disconnect + POST /session/reconnect).
location ~ ^/(auth|me|networks|push|api|session|uploads|healthz)(/|$) {
    proxy_pass http://grappa_upstream;
    proxy_http_version 1.1;
    # Empty Connection header is required for the upstream
    # `keepalive 32` pool to actually warm up. Without this, nginx
    # forwards the client's `Connection: close`/`keep-alive` header
    # verbatim to the upstream, defeating the pool — every request
    # opens a new TCP socket to Bandit. Pure perf nit, originally
    # flagged in the S22 phase-3 codebase review.
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# M-cluster admin REST allowlist — operator console surface (cic
# AdminPane). See the file-level moduledoc for the rationale + edit
# convention.
#
# E2E-ROBUSTNESS bucket D (2026-05-25) — added `test/` as a sibling
# admin-REST surface. Server-side route is compile-gated to dev/test
# Mix envs (router.ex; only ever 404s in a prod release because the
# scope macro is wrapped in `if Mix.env() in [:dev, :test]`). nginx
# allowlist permits the path either way; admission control is the
# BEAM's job, not nginx's.
#
# Admin-panel bucket 1 (2026-05-31) — added `servers` for the new
# nested server-CRUD routes (`/admin/networks/:nid/servers/:id`).
# Bare `/admin/networks` paths still resolve via the existing
# `networks` alt; nginx's regex alternation doesn't care about path
# nesting since both alternatives match the second path segment.
location ~ ^/admin/(visitors|sessions|credentials|networks|servers|reaper|circuit|users|me|settings|uploads|test)(/|$) {
    proxy_pass http://grappa_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Service Worker — never cache. iOS Safari + the SW spec cap
# registration HTTP cache at 24h, but RFC heuristics on Last-Modified/
# ETag can extend that further if upstream sets neither. Forcing
# no-cache means a re-deploy of `dist/` propagates the new SW on the
# next page load, not whenever the operator's browser feels like
# checking. The security-headers include re-asserts the full set
# because nginx's add_header inheritance stops at the first
# `add_header` in a more-specific block (the Cache-Control add_header
# above).
#
# Filename: `service-worker.js` — emitted by `vite-plugin-pwa`'s
# injectManifest mode (cic registers via `virtual:pwa-register` in
# main.tsx). NOT `sw.js` — that was the early-bucket convention
# before vite-plugin-pwa landed; carry-over here would 404 on the
# actual SW + cache the SPA index.html instead, defeating the whole
# "fresh SW per deploy" goal.
location = /service-worker.js {
    add_header Cache-Control "no-cache" always;
    include snippets/security-headers.conf;
    try_files $uri =404;
}

# SPA — try the literal path on disk, fall back to index.html so
# client-side routes (/login etc.) survive a hard refresh.
location / {
    try_files $uri /index.html;
}
