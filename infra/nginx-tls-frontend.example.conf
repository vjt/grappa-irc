# grappa — reference TLS-terminating reverse proxy (front door)
#
# This is OPTIONAL and goes IN FRONT of the Docker stack. The stack's own
# nginx (infra/nginx.conf, the `prod` compose profile) serves the PWA and
# proxies the API over plain HTTP on the host port you chose
# (NGINX_PUBLISH / HTTP_BIND, default 127.0.0.1:3000). For a localhost-only
# install you do NOT need this — browsers treat http://localhost as a
# secure context, so the PWA (service worker, push, install) already works.
#
# You need a front like this only to expose grappa off-localhost (LAN or
# public) while keeping the PWA working: service workers refuse to register
# over plain HTTP off-localhost, and over an UNTRUSTED cert. So use a
# trusted certificate:
#   - public:  a real domain + Let's Encrypt (certbot / acme.sh)
#   - LAN:     mkcert (installs a locally-trusted CA; SW registers cleanly)
# A self-signed cert is NOT enough — the browser rejects the service worker.
#
# Adapted from the production front (m42). TLS settings are inlined so this
# file is self-contained. Replace every <PLACEHOLDER> below.
#
# Also set, in the stack's .env, so Phoenix accepts the wss:// origin and
# mints correct links:
#   PHX_HOST=<your-domain>          # e.g. grappa.example.org
# X-Forwarded-Proto $scheme (set below) is load-bearing — Phoenix maps it
# back to scheme=https for check_origin and generated URLs.

upstream grappa_stack {
  # The Docker stack's published nginx port. Same host as this proxy →
  # 127.0.0.1:3000 (your HTTP_BIND). Separate host → <docker-host-ip>:3000.
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name <your-domain>;          # e.g. grappa.example.org

  ssl_certificate     /etc/ssl/grappa/fullchain.pem;
  ssl_certificate_key /etc/ssl/grappa/privkey.pem;

  # --- Modern TLS (Mozilla intermediate; AEAD only) ---
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers "ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256";
  ssl_ecdh_curve X25519:secp384r1:secp256r1;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Must be >= the largest upload cap (50MB video + multipart overhead).
  client_max_body_size 160m;

  # Phoenix Channels WebSocket. The bearer travels as ?token=, so the
  # access log is muted to keep secrets out of nginx/journald.
  location /socket {
    proxy_pass http://grappa_stack;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    access_log off;
  }

  # PWA service worker — never cache; SW rollouts must be immediate.
  location = /sw.js {
    proxy_pass http://grappa_stack;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache" always;
  }

  # Everything else (REST allowlist + SPA static + manifest + icons). The
  # stack's own nginx owns the /(auth|me|networks|push|healthz) allowlist
  # and the SPA fallback — this front just terminates TLS and forwards.
  location / {
    proxy_pass http://grappa_stack;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Redirect plaintext to HTTPS (keep an ACME challenge location here if you
# use HTTP-01 cert issuance).
server {
  listen 80;
  listen [::]:80;
  server_name <your-domain>;
  location / {
    return 301 https://$host$request_uri;
  }
}
